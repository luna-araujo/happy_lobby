name: Release Builds

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  validate_tag:
    runs-on: ubuntu-latest
    outputs:
      stable: ${{ steps.tag_check.outputs.stable }}
    steps:
      - name: Validate stable release tag
        id: tag_check
        shell: bash
        run: |
          if [[ "${GITHUB_REF_NAME}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "stable=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "stable=false" >> "$GITHUB_OUTPUT"
          echo "Skipping non-stable tag: ${GITHUB_REF_NAME}"

  export_and_release:
    runs-on: ubuntu-latest
    needs: validate_tag
    if: needs.validate_tag.outputs.stable == 'true'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Export game builds
        id: export
        uses: firebelley/godot-export@v7.0.0
        with:
          godot_executable_download_url: https://github.com/godotengine/godot-builds/releases/download/4.6.1-stable/Godot_v4.6.1-stable_linux.x86_64.zip
          godot_export_templates_download_url: https://github.com/godotengine/godot-builds/releases/download/4.6.1-stable/Godot_v4.6.1-stable_export_templates.tpz
          relative_project_path: ./
          use_preset_export_path: true
          cache: true
          presets_to_export: Windows Desktop,Linux/X11

      - name: Archive platform exports
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME}"
          mkdir -p dist

          (cd .exports/windows && zip -r "../../dist/happy_lobby-${VERSION}-windows.zip" .)
          (cd .exports/linux && zip -r "../../dist/happy_lobby-${VERSION}-linux.zip" .)

      - name: Publish GitHub release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            dist/happy_lobby-${{ github.ref_name }}-windows.zip
            dist/happy_lobby-${{ github.ref_name }}-linux.zip
